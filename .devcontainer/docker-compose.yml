services:
  backend:
    build: 
      context: ../backend
      dockerfile: ../.devcontainer/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=gcit_dashboard
    depends_on:
      - mongodb
    volumes:
      - ../backend:/app
      - /app/venv
      - ..:/workspace:cached

  frontend:
    build: 
      context: ../frontend
      dockerfile: ../.devcontainer/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
